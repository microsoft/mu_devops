# A reusable workflow that processes metadata from Mu QEMU PR Validation
# and posts PR comments and commit statuses.
#
# Copyright (c) Microsoft Corporation.
# SPDX-License-Identifier: BSD-2-Clause-Patent
##
name: Mu QEMU PR Validation Post

on:
  workflow_call:
    inputs:
      app-id:
        description: "GitHub App ID for generating tokens (must be passed since vars don't cross repo boundaries)"
        required: true
        type: string
      conclusion:
        description: "Conclusion of the triggering workflow run (e.g. success, failure, cancelled)"
        required: false
        type: string
        default: ''
      head-sha:
        description: "PR head commit SHA for commit status fallback when metadata is unavailable"
        required: false
        type: string
        default: ''
      triggering-run-id:
        description: "Workflow run ID of the completed Mu QEMU PR Validation run"
        required: true
        type: number
    secrets:
      private-key:
        description: "GitHub App private key for generating tokens"
        required: true

permissions:
  contents: read
  actions: read

jobs:
  post-process:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Download PR Metadata from Triggering Run
        id: download-metadata
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: mu-qemu-pr-metadata
          path: metadata
          github-token: ${{ steps.app-token.outputs.token }}
          run-id: ${{ inputs.triggering-run-id }}
          repository: ${{ github.repository }}

      - name: Skip if No Metadata Artifact
        if: steps.download-metadata.outcome != 'success'
        shell: bash
        run: |
          echo "::notice::PR metadata artifact not found for run ${{ inputs.triggering-run-id }}. Skipping post-processing."

      - name: Parse PR Metadata
        if: steps.download-metadata.outcome == 'success'
        id: metadata
        shell: python3 {0}
        run: |
          import json
          import os
          import pathlib

          data = json.loads(pathlib.Path('metadata/pr-metadata.json').read_text(encoding='utf-8'))

          def write(name: str, value):
              with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                  f.write(f"{name}={value}\n")

          write('pr_number', data.get('pr_number', ''))
          write('head_sha', data.get('head_sha', ''))
          write('caller_ref', data.get('caller_ref', ''))
          write('caller_repo_name', data.get('caller_repo_name', ''))
          write('mu_tiano_platforms_sha', data.get('mu_tiano_platforms_sha', ''))

          validation = data.get('validation', {})
          write('validation_failed', 'true' if validation.get('failed') else 'false')

          # Per-platform results as JSON for the comment script
          platforms = data.get('platforms', {})
          # Write as a single-line JSON string for safe GITHUB_OUTPUT embedding
          write('platforms_json', json.dumps(platforms, separators=(',', ':')))

          skipped = data.get('skipped', False)
          write('skipped', str(skipped).lower())
          write('skip_reason', data.get('skip_reason', ''))

      - name: Post Final PR Comment
        if: steps.download-metadata.outcome == 'success' && steps.metadata.outputs.skipped != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = parseInt('${{ steps.metadata.outputs.pr_number }}');
            if (!issue_number) {
              core.notice('No PR number found in metadata. Skipping comment.');
              return;
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ inputs.triggering-run-id }}`;
            const hiddenMarker = '<!-- mu-qemu-validation-result -->';
            const workflowName = 'Mu QEMU PR Validation';
            const marker = `*This comment was automatically generated by the ${workflowName} workflow.*`;

            const validationFailed = '${{ steps.metadata.outputs.validation_failed }}' === 'true';
            const callerRef = '${{ steps.metadata.outputs.caller_ref }}';
            const shortSha = callerRef.substring(0, 7);
            const callerRepoName = '${{ steps.metadata.outputs.caller_repo_name }}' || 'mu_basecore';
            const muTianoPlatformsSha = '${{ steps.metadata.outputs.mu_tiano_platforms_sha }}';
            const shortTianoPlatformsSha = muTianoPlatformsSha.substring(0, 7);

            const platforms = JSON.parse('${{ steps.metadata.outputs.platforms_json }}' || '{}');

            // Fetch artifact list from the triggering run to build direct download links
            const artifactMap = {};
            try {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: ${{ inputs.triggering-run-id }},
              });
              for (const a of artifacts.data.artifacts) {
                artifactMap[a.name] = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ inputs.triggering-run-id }}/artifacts/${a.id}`;
              }
            } catch (e) {
              core.warning(`Failed to list artifacts: ${e.message}`);
            }

            const icon = (outcome) => {
              if (outcome === 'success') return ':white_check_mark:';
              if (outcome === 'failure') return ':x:';
              if (outcome === 'skipped') return ':fast_forward:';
              return ':grey_question:';
            };

            // Build per-platform results table with direct artifact download links
            const platformRows = [];
            for (const [name, info] of Object.entries(platforms)) {
              const buildIcon = icon(info.build);
              const bootIcon = icon(info.boot);

              const buildArtifactName = `mu-qemu-build-logs-${name}`;
              const bootArtifactName = `mu-qemu-boot-logs-${name}`;

              const buildLogsLink = artifactMap[buildArtifactName]
                ? `[Build Logs](${artifactMap[buildArtifactName]})`
                : 'N/A';
              const bootLogsLink = artifactMap[bootArtifactName]
                ? `[Boot Logs](${artifactMap[bootArtifactName]})`
                : 'N/A';

              const bootDuration = info.boot_duration || 'N/A';

              platformRows.push(`| **${name}** | ${buildIcon} ${info.build} | ${bootIcon} ${info.boot} | ${bootDuration} | ${buildLogsLink} | ${bootLogsLink} |`);
            }

            let statusIcon, statusTitle;
            if (validationFailed) {
              statusIcon = ':x:';
              statusTitle = 'QEMU Validation Failed';
            } else {
              statusIcon = ':white_check_mark:';
              statusTitle = 'QEMU Validation Passed';
            }

            const body = [
              hiddenMarker,
              `## ${statusIcon} ${statusTitle}`,
              '',
              '### Source Dependencies',
              '',
              '| Repository | Commit |',
              '|------------|--------|',
              `| **${callerRepoName}** | \`${shortSha}\` |`,
              `| **mu_tiano_platforms** | \`${shortTianoPlatformsSha}\` |`,
              '',
              '### Results',
              '',
              '| Platform | Build | Boot | Overall Boot Time | Build Logs | Boot Logs |',
              '|----------|-------|------|-------------------|------------|-----------|',
              ...platformRows,
              '',
              `**Workflow run:** ${runUrl}`,
              '',
              marker,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const existingComment = comments.data.find((c) =>
              c.body.includes(hiddenMarker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Post Skipped PR Comment
        if: steps.download-metadata.outcome == 'success' && steps.metadata.outputs.skipped == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = parseInt('${{ steps.metadata.outputs.pr_number }}');
            if (!issue_number) return;

            const hiddenMarker = '<!-- mu-qemu-validation-result -->';
            const workflowName = 'Mu QEMU PR Validation';
            const marker = `*This comment was automatically generated by the ${workflowName} workflow.*`;
            const skipReason = '${{ steps.metadata.outputs.skip_reason }}';

            let reasonText;
            if (skipReason === 'merged') {
              reasonText = 'The PR was merged before validation started.';
            } else if (skipReason === 'closed') {
              reasonText = 'The PR was closed before validation started.';
            } else {
              reasonText = `Validation was skipped (reason: ${skipReason || 'unknown'}).`;
            }

            const body = [
              hiddenMarker,
              '## :fast_forward: QEMU Validation Skipped',
              '',
              reasonText,
              '',
              marker,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const existingComment = comments.data.find((c) =>
              c.body.includes(hiddenMarker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Set Final Commit Status
        if: steps.download-metadata.outcome == 'success' && steps.metadata.outputs.head_sha != '' && steps.metadata.outputs.skipped != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ inputs.triggering-run-id }}`;
            const validationFailed = '${{ steps.metadata.outputs.validation_failed }}' === 'true';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.metadata.outputs.head_sha }}',
              state: validationFailed ? 'failure' : 'success',
              description: validationFailed ? 'QEMU validation failed' : 'QEMU validation passed',
              context: 'Mu QEMU PR Validation',
              target_url: runUrl,
            });

      - name: Set Fallback Commit Status
        if: steps.download-metadata.outcome != 'success' && inputs.head-sha != ''
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ inputs.triggering-run-id }}`;
            const conclusion = '${{ inputs.conclusion }}';
            const state = (conclusion === 'success') ? 'success'
                        : (conclusion === 'cancelled') ? 'error'
                        : 'failure';
            const desc = (conclusion === 'success') ? 'QEMU validation passed'
                       : (conclusion === 'cancelled') ? 'QEMU validation cancelled'
                       : 'QEMU validation failed';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state,
              description: desc,
              context: 'Mu QEMU PR Validation',
              target_url: runUrl,
            });
