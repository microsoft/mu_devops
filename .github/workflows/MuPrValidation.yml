# A reusable workflow that builds mu_tiano_platforms QEMU platforms with
# PR changes and validates booting on QEMU.
#
# The caller specifies which submodule in mu_tiano_platforms to update
# (e.g. MU_BASECORE or Common/MU) with the PR commit before building.
#
# Copyright (c) Microsoft Corporation.
# SPDX-License-Identifier: BSD-2-Clause-Patent
##
name: Mu QEMU PR Validation

on:
  workflow_call:
    inputs:
      app-id:
        description: "GitHub App ID for generating tokens (must be passed since vars don't cross repo boundaries)"
        required: true
        type: string
      caller-ref:
        description: "Commit SHA to checkout for the PR head"
        required: true
        type: string
      caller-repo:
        description: "Full repo name (owner/repo) where the PR commit exists"
        required: true
        type: string
      caller-repo-name:
        description: "Short display name for the calling repo (e.g. mu_basecore, mu_plus)"
        required: true
        type: string
      head-sha:
        description: "PR head commit SHA for commit status updates"
        required: false
        type: string
        default: ''
      pr-number:
        description: "Pull request number in the calling repository"
        required: true
        type: number
      submodule-path:
        description: "Path to the submodule in mu_tiano_platforms to update (e.g. MU_BASECORE, Common/MU)"
        required: true
        type: string
    secrets:
      private-key:
        description: "GitHub App private key for generating tokens"
        required: true

permissions:
  contents: read
  actions: read

jobs:
  notify-in-progress:
    name: Post In-Progress Notification
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Update PR Comment to In-Progress
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = ${{ inputs.pr-number }};
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const hiddenMarker = '<!-- mu-qemu-validation-result -->';
            const workflowName = '${{ github.workflow }}';
            const marker = `*This comment was automatically generated by the ${workflowName} workflow.*`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const existingComment = comments.data.find((c) =>
              c.body.includes(hiddenMarker)
            );

            const body = [
              hiddenMarker,
              '## :hourglass_flowing_sand: QEMU Validation In Progress',
              '',
              'A new QEMU validation run has started. Results from any previous run(s) are now outdated.',
              '',
              '> **Note:** Previous results are available in this comment\'s edit history.',
              '',
              `**Workflow run:** ${runUrl}`,
              '',
              marker,
            ].join('\n');

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Set In-Progress Commit Status
        # TODO: Requires microsoft org admin to accept permissions
        # if: inputs.head-sha != ''
        if: false
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state: 'pending',
              description: 'Pre-build setup in progress',
              context: 'Mu QEMU PR Validation',
              target_url: runUrl,
            });

  build-and-boot:
    name: ${{ matrix.platform }} - Build and Boot
    runs-on: ubuntu-latest
    needs: [notify-in-progress]
    container:
      image: ghcr.io/microsoft/mu_devops/ubuntu-24-test:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Q35
            build_pkg: QemuQ35Pkg
            build_file: Platforms/QemuQ35Pkg/PlatformBuild.py
            run_flags: "SHUTDOWN_AFTER_RUN=TRUE QEMU_HEADLESS=TRUE EMPTY_DRIVE=TRUE BLD_*_QEMU_CORE_NUM=2"
          - platform: SBSA
            build_pkg: QemuSbsaPkg
            build_file: Platforms/QemuSbsaPkg/PlatformBuild.py
            run_flags: "SHUTDOWN_AFTER_RUN=TRUE QEMU_HEADLESS=TRUE EMPTY_DRIVE=TRUE"

    env:
      TOOL_CHAIN_TAG: CLANGPDB
      BUILD_TARGET: DEBUG

    steps:
      - name: Generate GitHub App Token
        if: inputs.head-sha != ''
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Checkout mu_tiano_platforms
        uses: actions/checkout@v6
        with:
          ref: main
          repository: microsoft/mu_tiano_platforms

      - name: Mark Workspace as Safe for Git
        shell: bash
        run: git config --global --add safe.directory '*'

      - name: Install Python Prerequisites
        shell: bash
        run: pip install -r pip-requirements.txt --upgrade

      - name: Stuart Setup
        shell: bash
        run: |
          stuart_setup -c ${{ matrix.build_file }} \
            TOOL_CHAIN_TAG=${{ env.TOOL_CHAIN_TAG }} \
            -t ${{ env.BUILD_TARGET }}

      - name: Update ${{ inputs.submodule-path }} to PR Commit
        shell: bash
        run: |
          set -euo pipefail
          REF='${{ inputs.caller-ref }}'
          REPO='${{ inputs.caller-repo }}'
          cd '${{ inputs.submodule-path }}'
          git remote set-url origin "https://github.com/${REPO}.git"
          git fetch origin "${REF}"
          git checkout "${REF}"
          echo "${{ inputs.submodule-path }} updated to $(git rev-parse HEAD)"
          cd ..

      - name: Stuart Update
        shell: bash
        run: |
          stuart_update -c ${{ matrix.build_file }} \
            TOOL_CHAIN_TAG=${{ env.TOOL_CHAIN_TAG }} \
            -t ${{ env.BUILD_TARGET }}

      - name: Update Commit Status - Build
        # TODO: Requires microsoft org admin to accept permissions
        # if: inputs.head-sha != ''
        if: false
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ inputs.head-sha }}" \
            -d '{"state":"pending","description":"Building ${{ matrix.platform }}...","context":"Mu QEMU PR Validation","target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Build ${{ matrix.platform }}
        id: build
        shell: bash
        run: |
          stuart_build -c ${{ matrix.build_file }} \
            TOOL_CHAIN_TAG=${{ env.TOOL_CHAIN_TAG }} \
            TARGET=${{ env.BUILD_TARGET }}

      - name: Update Commit Status - Boot
        # TODO: Requires microsoft org admin to accept permissions
        # if: inputs.head-sha != '' && steps.build.outcome == 'success'
        if: false
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ inputs.head-sha }}" \
            -d '{"state":"pending","description":"Booting ${{ matrix.platform }}...","context":"Mu QEMU PR Validation","target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Record Boot Start Time
        if: steps.build.outcome == 'success'
        id: boot-start
        shell: bash
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Boot ${{ matrix.platform }} to EFI Shell
        id: boot
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          stuart_build -c ${{ matrix.build_file }} \
            TOOL_CHAIN_TAG=${{ env.TOOL_CHAIN_TAG }} \
            TARGET=${{ env.BUILD_TARGET }} \
            ${{ matrix.run_flags }} \
            --FlashOnly
        timeout-minutes: 5

      - name: Record Boot End Time
        if: always() && steps.boot-start.outputs.epoch != ''
        id: boot-end
        shell: bash
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Update Commit Status - Post-Boot
        # TODO: Requires microsoft org admin to accept permissions
        # if: always() && inputs.head-sha != ''
        if: false
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ inputs.head-sha }}" \
            -d '{"state":"pending","description":"Post-boot (${{ matrix.platform }})...","context":"Mu QEMU PR Validation","target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Record Step Results
        if: always()
        shell: python3 {0}
        env:
          BOOT_END: ${{ steps.boot-end.outputs.epoch }}
          BOOT_OUTCOME: ${{ steps.boot.outcome }}
          BOOT_START: ${{ steps.boot-start.outputs.epoch }}
          BOOT_TIMEOUT_SEC: '300'
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          import json
          import os
          import pathlib

          boot_start = os.environ.get('BOOT_START', '')
          boot_end = os.environ.get('BOOT_END', '')
          timeout_sec = int(os.environ.get('BOOT_TIMEOUT_SEC', '300'))

          if boot_start and boot_end:
              duration_s = int(boot_end) - int(boot_start)
              minutes, seconds = divmod(duration_s, 60)
              boot_duration = f'{minutes}m {seconds}s'
              if duration_s >= timeout_sec:
                  boot_duration += ' (timed out)'
          else:
              boot_duration = 'N/A'

          results = {
              'platform': os.environ['PLATFORM'],
              'build': os.environ.get('BUILD_OUTCOME', ''),
              'boot': os.environ.get('BOOT_OUTCOME', ''),
              'boot_duration': boot_duration,
          }

          output_dir = pathlib.Path('results')
          output_dir.mkdir(exist_ok=True)
          output_path = output_dir / f'{results["platform"]}.json'
          output_path.write_text(json.dumps(results, indent=2), encoding='utf-8')

      - name: Upload Step Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mu-qemu-results-${{ matrix.platform }}
          path: results/${{ matrix.platform }}.json

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mu-qemu-build-logs-${{ matrix.platform }}
          path: |
            Build/**/BUILDLOG*Pkg.txt
          if-no-files-found: warn

      - name: Upload Boot Logs
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: mu-qemu-boot-logs-${{ matrix.platform }}
          path: |
            Build/**/BUILDLOG*_Run.txt
          if-no-files-found: warn

  emit-pr-metadata:
    name: Emit PR Metadata
    runs-on: ubuntu-latest
    needs: [build-and-boot]
    if: always()
    steps:
      - name: Download Q35 Results
        id: dl-q35
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: mu-qemu-results-Q35
          path: results

      - name: Download SBSA Results
        id: dl-sbsa
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: mu-qemu-results-SBSA
          path: results

      - name: Write PR Metadata
        shell: python3 {0}
        env:
          BUILD_BOOT_RESULT: ${{ needs.build-and-boot.result }}
          CALLER_REF: ${{ inputs.caller-ref }}
          CALLER_REPO_NAME: ${{ inputs.caller-repo-name }}
          HEAD_SHA: ${{ inputs.head-sha }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          import json
          import os
          import pathlib
          import subprocess

          build_boot_result = os.environ['BUILD_BOOT_RESULT']

          # Resolve mu_tiano_platforms HEAD commit (same ref used by the build job)
          result = subprocess.run(
              ['git', 'ls-remote', 'https://github.com/microsoft/mu_tiano_platforms.git', 'HEAD'],
              capture_output=True, text=True, check=True,
          )
          mu_tiano_platforms_sha = result.stdout.split()[0] if result.stdout.strip() else ''

          # Aggregate per-platform results
          platforms = {}
          for p in ('Q35', 'SBSA'):
              result_file = pathlib.Path(f'results/{p}.json')
              if result_file.exists():
                  platforms[p] = json.loads(result_file.read_text(encoding='utf-8'))
              else:
                  platforms[p] = {'platform': p, 'build': 'skipped', 'boot': 'skipped'}

          metadata = {
              'pr_number': int(os.environ['PR_NUMBER']),
              'head_sha': os.environ['HEAD_SHA'],
              'caller_ref': os.environ['CALLER_REF'],
              'caller_repo_name': os.environ.get('CALLER_REPO_NAME', ''),
              'mu_tiano_platforms_sha': mu_tiano_platforms_sha,
              'platforms': platforms,
              'validation': {
                  'build_and_boot_result': build_boot_result,
                  'failed': build_boot_result not in ('success', 'skipped'),
              },
          }

          output_dir = pathlib.Path('metadata')
          output_dir.mkdir(exist_ok=True)
          output_path = output_dir / 'pr-metadata.json'
          output_path.write_text(json.dumps(metadata, indent=2), encoding='utf-8')

      - name: Upload PR Metadata Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mu-qemu-pr-metadata
          path: metadata/pr-metadata.json
          if-no-files-found: error
